---
title: 'Reset Password'
---

<div class="container" style="text-align: center;">
  <h1><span class="eng">Reset Password</span> <span class="chn">重置密码</span></h1>
  <form class="login-grid">
    <label for="fp-email"><span class="eng">Email</span> <span class="chn">电邮</span>:</label>
    <input type="email" id="fp-email" placeholder="Enter your email.../輸入电邮..." style="font-size: 16px" />
    <label for="fp-verification"><span class="eng">Verification Code</span> <span class="chn">验证码</span>:</label>
    <input type="password" id="fp-verification" placeholder="Enter your verification code.../輸入验证码..." style="font-size: 16px" />
    <label for="fp-username" class="fp-credential-field"><span class="eng">New Username</span> <span class="chn">新用户名</span>:</label>
    <input type="text" id="fp-username" class="fp-credential-field" placeholder="Enter your new username.../輸入新用戶名..." style="font-size: 16px" />
    <label for="fp-password" class="fp-credential-field"><span class="eng">New Password</span> <span class="chn">新密码</span>:</label>
    <input type="password" id="fp-password" class="fp-credential-field" placeholder="Enter your new password.../輸入新密码..." style="font-size: 16px" />
    <label for="fp-password-re" class="fp-credential-field"><span class="eng">Enter Password again</span> <span class="chn">再次输入密码</span>:</label>
    <input type="password" id="fp-password-re" class="fp-credential-field" placeholder="Enter your new password.../輸入新密码..." style="font-size: 16px" />
  </form>
  <br>
  <button id="fp-send-code-btn" onclick="sendResetCode()">
    <span class="eng">Send Code</span><span class="chn">发送验证码</span>
  </button>
  &nbsp;
  <button id="fp-verify-code-btn" onclick="verifyResetCode()">
    <span class="eng">Verify Code</span><span class="chn">验证验证码</span>
  </button>
  &nbsp;
  <button id="fp-submit-btn" onclick="submitResetRequest()">
    <span class="eng">Submit Reset Request</span><span class="chn">提交重置请求</span>
  </button>
  <br><br>
  <button onclick="window.location.href='/log-in/'">
    <span class="eng">Back to Log in</span><span class="chn">返回登录</span>
  </button>
</div>

<div id="fp-email-missing-modal" style="display: none; position: fixed; inset: 0; background: rgba(0, 0, 0, 0.45); z-index: 9999;">
  <div style="max-width: 420px; width: calc(100% - 32px); margin: 16vh auto 0 auto; background: var(--background-light, #fff); border-radius: 10px; padding: 16px 18px; box-shadow: 0 8px 26px rgba(0, 0, 0, 0.28); text-align: center;">
    <h3><span class="eng">Email Not Registered</span><span class="chn">邮箱未注册</span></h3>
    <p>
      <span class="eng">This email is not registered yet.</span>
      <span class="chn">该邮箱尚未注册。</span>
    </p>
    <button onclick="window.location.href='/register/'">
      <span class="eng">Go to Register</span><span class="chn">前往注册</span>
    </button>
    &nbsp;
    <button onclick="closeMissingEmailModal()">
      <span class="eng">Close</span><span class="chn">关闭</span>
    </button>
  </div>
</div>

<script type="module" src="/assets/js/forget-password-page.js"></script>
