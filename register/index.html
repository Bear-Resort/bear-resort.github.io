---
title: 'Join Fandom'
---

<div class="container">
    <h1><span class="eng">Join Fandom</span> <span class="chn">加入粉丝</span></h1>
    <img src="/assets/img/fans.gif" style="width: 200px; height: 200px;"><br>
    <br>
    <span class="eng">Users of the Bear Resort enjoys "fans-only" exclusive contents.</span>
    <span class="chn">小熊樂園用户享受“粉丝专享”独家资源。</span> 
    <br>
    <div id="login-form" style="text-align: center;">
      <h2><span class="eng">Register</span> <span class="chn">注册</span></h2>
      <form class="login-grid">
      <label for="email"><span class="eng">Email</span> <span class="chn">电邮</span>:</label> <input type="email" id="email" placeholder="Enter your email.../輸入电邮..." style="font-size: 16px" required />
      <label for="verification"><span class="eng">Verification Code</span> <span class="chn">验证码</span>:</label> <input type="password" id="verification" placeholder="Enter your verification code.../輸入验证码..." required />
      <label for="name" class="credential-field"><span class="eng">Name</span> <span class="chn">姓名</span>:</label> <input type="text" id="name" class="credential-field" placeholder="Enter your name.../輸入姓名..." style="font-size: 16px" required />
      <label for="username" class="credential-field"><span class="eng">Username</span> <span class="chn">用户名</span>:</label> <input type="text" id="username" class="credential-field" placeholder="Enter your username.../輸入用戶名..." style="font-size: 16px" required />
      <label for="password" class="credential-field"><span class="eng">Password</span> <span class="chn">密码</span>:</label> <input type="password" id="password" class="credential-field" placeholder="Enter your password.../輸入密码..." style="font-size: 16px" required />
      <label for="re-password" class="credential-field"><span class="eng">Enter Password again</span> <span class="chn">再次输入密码</span>:</label> <input type="password" id="re-password" class="credential-field" placeholder="Enter your password.../輸入密码..." required />
      </form>
      <div id="email-exists-alert" style="display: none; margin-top: 10px;">
        <span class="eng">This email is already registered.</span>
        <span class="chn">此邮箱已被注册。</span>
        <br>
        <button onclick="window.location.href='/log-in/'">
          <span class="eng">Go to Log in</span><span class="chn">前往登录</span>
        </button>
      </div>
      <br><br>
      <button id="veri"><span class="eng">Get Verification Code</span> <span class="chn">获取验证码</span></button> &nbsp; 
      <button id="verify-code"><span class="eng">Verify Code</span> <span class="chn">验证验证码</span></button> &nbsp;
      <button id="sub"><span class="eng">Submit</span> <span class="chn">提交</span></button>
    </div>
    <br>
    <div style="text-align: center">
        <h2><span class="eng">Do not give your password to other people!</span> <span class="chn">不要把密码给别人！</span></h2>
    </div>
</div>

<script type="module" src="./main.js"></script>
