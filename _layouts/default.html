<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/variable.css" />
    <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css" />
    <link rel="shortcut icon" href="{{ site.baseurl }}/logos/favicon.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather&display=swap"
      rel="stylesheet"
    />
  </head>

  <style>
    img {
      max-width: 100%;
      height: auto;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
  </style>

  <body class="day-theme">
    <script type="module" src="{{ site.baseurl }}/assets/js/cookie.js"></script>
    <script type="module" src="{{ site.baseurl }}/assets/js/lang.js"></script>
    <script type="module" src="{{ site.baseurl }}/assets/js/day-night.js"></script>
    <div class="topnav" style="text-align: center">
      <img
        src="{{ site.baseurl }}/logos/default-bear.gif"
        width="25"
        height="25"
        style="vertical-align: middle; display: inline-block"
      />
      <a href="{{ site.baseurl }}/index.html" id="home">
        <span class="eng">Bear Resort</span><span class="chn">小熊樂園</span></a
      >
      &nbsp; &nbsp; &nbsp; &nbsp; <span class="eng">Temporary Window</span>
      <span class="chn">临时窗口</span>
    </div>

    <div id="content" style="text-align: left">
      <a href="{{ site.baseurl }}/log-in/" id="login">Log in</a>

      <script src="{{ site.baseurl }}/assets/js/forge.js"></script>
      <script src="{{ site.baseurl }}/assets/js/prsa.js"></script>
      <script type="module" src="{{ site.baseurl }}/assets/js/login.js"></script>

      <br /><br /><br />

      {{ content }}

      <br /><br /><br />
      <div id="day-night">🌞</div>
      <div id="lang">Eng</div>
    </div>

    <div class="botnav" style="text-align: center">
      <span class="eng">When you are finished, you can just close the page.</span>
      <span class="chn">当你用完本界面，请直接关闭界面。</span>
    </div>

    <div id="result-modal" style="display: none">
      <div id="result-box">
        <div id="result-text"></div>
        <button id="close-modal-btn">×</button>
      </div>
    </div>

    <script src="{{ site.baseurl }}/assets/js/link.js"></script>
    <script src="{{ site.baseurl }}/assets/js/alert.js"></script>

    <script src="{{ site.baseurl }}/assets/js/listener.js"></script>

    <script
      type="text/javascript"
      async
      src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"
    ></script>

    <script src="{{ site.baseurl }}/assets/js/textarea.js"></script>
  </body>
</html>
